name: Integration Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      npm_config_cache: ${{ github.workspace }}/.npm-cache
      npm_config_script_shell: bash
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install MetaCall Unix (Debug)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh -s -- --debug

      - name: Install MetaCall Windows
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Unrestricted -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; &([scriptblock]::Create((Invoke-WebRequest -UseBasicParsing 'https://raw.githubusercontent.com/metacall/install/master/install.ps1')))"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          METACALL_INSTALL_PATH: /opt/homebrew/lib
        run: cargo build

      - name: Build (non-macOS)
        if: runner.os != 'macOS'
        run: cargo build

      - name: Cache metassr vendor (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.metassr/vendor
          key: metassr-vendor-${{ runner.os }}-${{ hashFiles('crates/metassr-bundler/vendor/package.json') }}

      - name: Cache metassr vendor (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\Users\X\AppData\Roaming\metassr\vendor
          key: metassr-vendor-${{ runner.os }}-${{ hashFiles('crates/metassr-bundler/vendor/package.json') }}

      - name: Install web-app dependencies
        working-directory: ./tests/web-app
        shell: bash
        run: npm install

      - name: Build SSR (macOS)
        if: runner.os == 'macOS'
        working-directory: ./tests/web-app
        shell: bash
        env:
          METACALL_INSTALL_PATH: /opt/homebrew/lib
        run: npm run build:debug

      - name: Build SSR (non-macOS)
        if: runner.os != 'macOS'
        working-directory: ./tests/web-app
        shell: bash
        run: npm run build:debug

      - name: Validate build output
        working-directory: ./tests/web-app
        shell: bash
        run: bash tests/bundle.sh

      - name: SSR server tests (macOS)
        if: runner.os == 'macOS'
        timeout-minutes: 5
        working-directory: ./tests/web-app
        shell: bash
        env:
          METACALL_INSTALL_PATH: /opt/homebrew/lib
        run: |
          npm run start:debug &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl --silent --output /dev/null http://localhost:8080 2>/dev/null && break
            sleep 1
          done
          bash tests/ssr.sh
          kill $SERVER_PID 2>/dev/null || true
          pkill -f "metassr.*run" 2>/dev/null || true

      - name: SSR server tests (non-macOS)
        if: runner.os != 'macOS'
        timeout-minutes: 5
        working-directory: ./tests/web-app
        shell: bash
        run: |
          npm run start:debug &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl --silent --output /dev/null http://localhost:8080 2>/dev/null && break
            sleep 1
          done
          bash tests/ssr.sh
          kill $SERVER_PID 2>/dev/null || true
          pkill -f "metassr.*run" 2>/dev/null || true

      - name: Force kill metassr processes (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          taskkill /F /IM metassr.exe /T 2>$null
          Start-Sleep -Seconds 3

      - name: Clean dist for SSG
        working-directory: ./tests/web-app
        shell: bash
        run: rm -rf dist

      - name: Build SSG (macOS)
        if: runner.os == 'macOS'
        working-directory: ./tests/web-app
        shell: bash
        env:
          METACALL_INSTALL_PATH: /opt/homebrew/lib
        run: npm run build:debug:ssg

      - name: Build SSG (non-macOS)
        if: runner.os != 'macOS'
        working-directory: ./tests/web-app
        shell: bash
        run: npm run build:debug:ssg

      - name: SSG server tests (macOS)
        if: runner.os == 'macOS'
        timeout-minutes: 5
        working-directory: ./tests/web-app
        shell: bash
        env:
          METACALL_INSTALL_PATH: /opt/homebrew/lib
        run: |
          npm run start:debug:ssg &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl --silent --output /dev/null http://localhost:8080 2>/dev/null && break
            sleep 1
          done
          bash tests/ssg.sh
          kill $SERVER_PID 2>/dev/null || true
          pkill -f "metassr.*run" 2>/dev/null || true

      - name: SSG server tests (non-macOS)
        if: runner.os != 'macOS'
        timeout-minutes: 5
        working-directory: ./tests/web-app
        shell: bash
        run: |
          npm run start:debug:ssg &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl --silent --output /dev/null http://localhost:8080 2>/dev/null && break
            sleep 1
          done
          bash tests/ssg.sh
          kill $SERVER_PID 2>/dev/null || true
          pkill -f "metassr.*run" 2>/dev/null || true