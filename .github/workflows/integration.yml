name: Integration Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install MetaCall Unix (Debug)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh -s -- --debug

      - name: Install MetaCall Windows
        if: runner.os == 'Windows'
        run: powershell -NoProfile -ExecutionPolicy Unrestricted -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; &([scriptblock]::Create((Invoke-WebRequest -UseBasicParsing 'https://raw.githubusercontent.com/metacall/install/master/install.ps1')))"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cargo build

      - name: Fix npm cache permissions (macOS only)
        if: matrix.os == 'macos-latest'
        run: sudo chown -R $(id -u):$(id -g) ~/.npm

      - name: Build (non-macOS)
        if: runner.os != 'macOS'
        run: cargo build

      - name: Integration Testing (macOS)
        if: runner.os == 'macOS'
        timeout-minutes: 10
        working-directory: ./tests/web-app
        shell: bash
        env:
          npm_config_script_shell: bash
          npm_config_cache: ${{ github.workspace }}/.npm-cache
        run: |
          npm install
          npm run build:debug
          npm run start:debug &
          sleep 10
          response=$(curl --write-out "%{http_code}" --silent --output /dev/null http://localhost:8080)
          if [ "$response" -ne 200 ]; then
            echo "Server did not respond with status 200"
            exit 1
          fi
          exit 0

      - name: Integration Testing (non-macOS)
        if: runner.os != 'macOS'
        timeout-minutes: 10
        working-directory: ./tests/web-app
        shell: bash
        env:
          npm_config_script_shell: bash
          npm_config_cache: ${{ github.workspace }}/.npm-cache
        run: |
          npm install
          npm run build:debug
          npm run start:debug &
          sleep 10
          response=$(curl --write-out "%{http_code}" --silent --output /dev/null http://localhost:8080)
          if [ "$response" -ne 200 ]; then
            echo "Server did not respond with status 200"
            exit 1
          fi
          exit 0

      - name: Fix npm cache permissions before Playwright install (macOS)
        if: runner.os == 'macOS'
        run: sudo chown -R $(id -u):$(id -g) ~/.npm

      - name: Install Playwright
        working-directory: ./tests/web-app
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Start Server
        working-directory: ./tests/web-app
        shell: bash
        run: |
          npm run start:debug &
          echo $! > server.pid

          echo "Waiting for server..."

          for i in {1..30}; do
            if curl -fs http://localhost:8080 > /dev/null; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done

          echo "Server failed to start"
          exit 1

      - name: Debug server response (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          curl -v http://localhost:8080/ || true 

      - name: Run Playwright test
        working-directory: ./tests/web-app
        shell: bash
        run: node tests/playwright-test.js
