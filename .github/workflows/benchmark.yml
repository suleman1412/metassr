name: Benchmark

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Run benchmarks weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install MetaCall
        run: curl -sL https://raw.githubusercontent.com/metacall/install/master/install.sh | sh

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: tests/web-app/package-lock.json

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Build MetaSSR
        run: cargo build --release

      - name: Setup test app
        working-directory: ./tests/web-app
        run: npm install && npm run build

      - name: Start server
        working-directory: ./tests/web-app
        run: |
          npm start &
          sleep 10

      - name: Run benchmarks
        run: python3 benchmarks/benchmark.py --skip-build

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .bench/
          retention-days: 90
